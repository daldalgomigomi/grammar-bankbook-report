<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문법 문제뱅크 판매 보고서</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #eaf0f8; color: #1a2456; }
  header {
    background: linear-gradient(135deg, #1a2456 0%, #2b3f8c 100%);
    color: #fff; padding: 0 32px;
    display: flex; align-items: stretch; min-height: 64px;
  }
  .header-inner { display: flex; align-items: center; width: 100%; gap: 14px; }
  .header-badge { background: #f5c200; color: #1a2456; font-size: 11px; font-weight: 800; padding: 3px 9px; border-radius: 20px; letter-spacing: 0.3px; white-space: nowrap; }
  header h1 { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; }
  header .updated { font-size: 12px; opacity: 0.65; margin-left: auto; }
  .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }
  .section { background: #fff; border-radius: 14px; padding: 24px 24px 20px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(26,36,86,0.07); border-top: 3px solid #1a2456; }
  .section-title { font-size: 14px; font-weight: 800; color: #1a2456; margin-bottom: 18px; padding-bottom: 10px; border-bottom: 1px solid #eaf0f8; letter-spacing: -0.2px; }
  .chart-wrap { position: relative; height: 260px; }
  .chart-wrap-sm { position: relative; height: 300px; }
  .loading { text-align: center; padding: 80px; color: #8899bb; font-size: 14px; }

  /* 섹션1 레이아웃: 도넛 + 바 나란히 */
  .sec1-grid { display: flex; gap: 24px; align-items: center; }
  .sec1-donut { flex: 0 0 280px; height: 280px; position: relative; }
  .sec1-bar { flex: 1; height: 260px; position: relative; }
  .legend-list { margin-top: 14px; display: flex; flex-direction: column; gap: 6px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #333; }
  .legend-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: #1a2456; }
  th { padding: 10px 12px; text-align: center; font-weight: 700; color: #fff; white-space: nowrap; font-size: 12px; }
  th:first-child { text-align: left; }
  td { padding: 9px 12px; text-align: center; border-bottom: 1px solid #f0f3f9; color: #333; }
  tbody tr:hover { background: #f4f7fd; }
  td.date { text-align: left; font-weight: 600; color: #1a2456; }
  td.date.sat { color: #1a6fc4; }
  td.date.sun { color: #e3001b; }
  td.free-total { background: #e8edf8; font-weight: 700; color: #1a2456; }
  td.paid-total { background: #fff8d6; font-weight: 700; color: #7a5c00; }
  .total-row td { font-weight: 800; background: #fffbe6; color: #1a2456; border-top: 2px solid #f5c200; }
  .zero { color: #ccc; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <span class="header-badge">NE능률</span>
    <h1>문법 문제뱅크 판매 보고서</h1>
    <span class="updated" id="updated-at"></span>
  </div>
</header>

<div class="container">
  <div id="loading" class="loading">데이터 불러오는 중...</div>
  <div id="main" style="display:none">

    <!-- 1. 누적 유료상품별 판매비중 -->
    <div class="section">
      <div class="section-title">1. 누적 유료상품별 판매비중</div>
      <div class="sec1-grid">
        <div>
          <div class="sec1-donut"><canvas id="chartDonut"></canvas></div>
        </div>
        <div class="sec1-bar"><canvas id="chartPaidBar"></canvas></div>
      </div>
    </div>

    <!-- 2. 월별 유료상품 매출 -->
    <div class="section">
      <div class="section-title">2. 월별 유료상품 매출</div>
      <div class="chart-wrap"><canvas id="chartRevenue"></canvas></div>
    </div>

    <!-- 3. 월별 무료체험 신청수 -->
    <div class="section">
      <div class="section-title">3. 월별 무료체험 상품 신청수</div>
      <div class="chart-wrap"><canvas id="chartMonthlyFree"></canvas></div>
    </div>

    <!-- 4. 일별 무료체험 신청수 -->
    <div class="section">
      <div class="section-title">4. 일별 무료체험 신청수</div>
      <div class="chart-wrap"><canvas id="chartDailyFree"></canvas></div>
    </div>

    <!-- 5. 일별 상세 데이터 -->
    <div class="section">
      <div class="section-title">5. 일별 상세 데이터</div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>날짜</th>
              <th>2주 무료</th>
              <th>4주 무료</th>
              <th>무료 합계</th>
              <th>1개월</th>
              <th>3개월</th>
              <th>6개월</th>
              <th>12개월</th>
              <th>유료 합계</th>
              <th>매출(원)</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
const URLS = {
  w2:   'https://docs.google.com/spreadsheets/d/e/2PACX-1vSfGDC6c6b9czCNyTwYKGKrKhyhCVo5DXaNvVieb9TTfWzyMymuq--QhiUgwpTYtMY03TpbTmaGeTf1/pub?gid=0&single=true&output=csv',
  w4:   'https://docs.google.com/spreadsheets/d/e/2PACX-1vSfGDC6c6b9czCNyTwYKGKrKhyhCVo5DXaNvVieb9TTfWzyMymuq--QhiUgwpTYtMY03TpbTmaGeTf1/pub?gid=1465275243&single=true&output=csv',
  paid: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSfGDC6c6b9czCNyTwYKGKrKhyhCVo5DXaNvVieb9TTfWzyMymuq--QhiUgwpTYtMY03TpbTmaGeTf1/pub?gid=1049889585&single=true&output=csv'
};

const MONTHS   = ['6월','7월','8월','9월','10월','11월','12월'];
const MONTH_NUMS = [6,7,8,9,10,11,12];
const PRODUCTS = ['1개월','3개월','6개월','12개월'];
const NAVY       = '#1a2456';
const NAVY_LIGHT = '#c8d4ee';
const YELLOW     = '#f5c200';

// 상품별 컬러
const PROD_COLORS = {
  '1개월':  '#1a2456',
  '3개월':  '#2b3f8c',
  '6개월':  '#f5c200',
  '12개월': '#c8d4ee',
};

function parseDate(str) {
  if (!str) return null;
  str = str.toString().trim();
  let m;
  m = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  m = str.match(/(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (m) return new Date(+m[3], +m[1]-1, +m[2]);
  return null;
}
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmt(n) { return (n||0).toLocaleString('ko-KR'); }
function cell(v) { return v ? `<td>${fmt(v)}</td>` : `<td class="zero">-</td>`; }
function fetchCSV(url) {
  return new Promise((res, rej) => {
    Papa.parse(url, {
      download: true, header: true, skipEmptyLines: true,
      complete: r => res(r.data), error: e => rej(e)
    });
  });
}

async function main() {
  try {
    const [raw2, raw4, rawPaid] = await Promise.all([fetchCSV(URLS.w2), fetchCSV(URLS.w4), fetchCSV(URLS.paid)]);

    const count2w = {}, count4w = {}, paidCount = {}, paidRevenue = {};

    if (raw2.length) {
      const k = Object.keys(raw2[0])[0];
      raw2.forEach(r => { const d = parseDate(r[k]); if (!d) return; const key = fmtDate(d); count2w[key] = (count2w[key]||0)+1; });
    }
    if (raw4.length) {
      const k = Object.keys(raw4[0])[0];
      raw4.forEach(r => { const d = parseDate(r[k]); if (!d) return; const key = fmtDate(d); count4w[key] = (count4w[key]||0)+1; });
    }
    if (rawPaid.length) {
      const keys = Object.keys(rawPaid[0]);
      const dKey = keys[0];
      const pKey = keys.find(k => k.replace(/\s/g,'').includes('주문상품') || k.replace(/\s/g,'').includes('상품명'));
      const aKey = keys.find(k => k.replace(/\s/g,'').includes('결제금액') || k.replace(/\s/g,'').includes('금액'));
      rawPaid.forEach(r => {
        const d = parseDate(r[dKey]); if (!d) return;
        const ds = fmtDate(d);
        const prod = pKey ? (r[pKey]||'').trim() : '';
        const amt  = aKey ? parseInt((r[aKey]||'0').toString().replace(/[^0-9]/g,''))||0 : 0;
        if (!paidCount[ds])   { paidCount[ds] = {}; PRODUCTS.forEach(p => paidCount[ds][p]=0); }
        if (!paidRevenue[ds]) paidRevenue[ds] = 0;
        if (PRODUCTS.includes(prod)) paidCount[ds][prod]++;
        paidRevenue[ds] += amt;
      });
    }

    const allKeys = [...Object.keys(count2w),...Object.keys(count4w),...Object.keys(paidCount)];
    const year = allKeys.length ? allKeys[0].split('-')[0] : '2026';
    const isMonth = (ds, mo) => ds.startsWith(`${year}-${String(mo).padStart(2,'0')}`);

    // 누적 유료 상품별 합계
    const totalProd = {};
    PRODUCTS.forEach(p => totalProd[p] = 0);
    Object.values(paidCount).forEach(obj => {
      PRODUCTS.forEach(p => totalProd[p] += (obj[p]||0));
    });
    const totalPaidAll = PRODUCTS.reduce((s,p) => s+totalProd[p], 0);

    const monthRev = MONTH_NUMS.map(mo => Object.entries(paidRevenue).filter(([d])=>isMonth(d,mo)).reduce((s,[,v])=>s+v,0));
    const month2w  = MONTH_NUMS.map(mo => Object.entries(count2w).filter(([d])=>isMonth(d,mo)).reduce((s,[,v])=>s+v,0));
    const month4w  = MONTH_NUMS.map(mo => Object.entries(count4w).filter(([d])=>isMonth(d,mo)).reduce((s,[,v])=>s+v,0));
    const monthFreeTotal = month2w.map((v,i) => v + month4w[i]);

    const juneDates = [...new Set([...Object.keys(count2w),...Object.keys(count4w),...Object.keys(paidCount)])]
      .filter(d => isMonth(d,6)).sort();
    const dailyLabels = juneDates.map(d => d.slice(5));
    const daily2w = juneDates.map(d => count2w[d]||0);
    const daily4w = juneDates.map(d => count4w[d]||0);

    document.getElementById('updated-at').textContent = `업데이트: ${new Date().toLocaleDateString('ko-KR')}`;

    const base = {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position:'top', align:'end', labels:{ font:{size:12}, boxWidth:12, padding:16 } }
      },
      scales: {
        x: { grid:{display:false}, ticks:{font:{size:11}, color:'#666'} },
        y: { beginAtZero:true, grid:{color:'#f0f3f9'}, ticks:{font:{size:11}, color:'#666'} }
      }
    };

    // 1-A. 도넛 차트
    new Chart(document.getElementById('chartDonut'), {
      type: 'doughnut',
      data: {
        labels: PRODUCTS,
        datasets: [{
          data: PRODUCTS.map(p => totalProd[p]),
          backgroundColor: PRODUCTS.map(p => PROD_COLORS[p]),
          borderWidth: 2,
          borderColor: '#fff'
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        cutout: '62%',
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => {
                const val = ctx.raw;
                const pct = totalPaidAll ? ((val/totalPaidAll)*100).toFixed(1) : 0;
                return ` ${ctx.label}: ${val}개 (${pct}%)`;
              }
            }
          }
        }
      },
      plugins: [{
        id: 'centerText',
        afterDraw(chart) {
          const { ctx, chartArea:{ left, top, right, bottom } } = chart;
          const cx = (left+right)/2, cy = (top+bottom)/2;
          ctx.save();
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.font = 'bold 22px Apple SD Gothic Neo, sans-serif';
          ctx.fillStyle = NAVY;
          ctx.fillText(totalPaidAll, cx, cy - 10);
          ctx.font = '11px Apple SD Gothic Neo, sans-serif';
          ctx.fillStyle = '#888';
          ctx.fillText('총 판매', cx, cy + 12);
          ctx.restore();
        }
      }]
    });

    // 1-B. 상품별 바 차트
    new Chart(document.getElementById('chartPaidBar'), {
      type: 'bar',
      data: {
        labels: [...PRODUCTS, '전체'],
        datasets: [{
          label: '판매 수량',
          data: [...PRODUCTS.map(p => totalProd[p]), totalPaidAll],
          backgroundColor: [...PRODUCTS.map(p => PROD_COLORS[p]), '#4a90d9'],
          borderRadius: 6
        }]
      },
      options: {
        ...base,
        layout: { padding: { top: 36 } },
        scales: {
          x: { ...base.scales.x },
          y: { ...base.scales.y,
            max: Math.ceil(Math.max(...PRODUCTS.map(p => totalProd[p]), totalPaidAll) * 1.25)
          }
        },
        plugins: {
          ...base.plugins,
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => {
                const pct = totalPaidAll ? ((ctx.raw/totalPaidAll)*100).toFixed(1) : 0;
                return ` ${ctx.raw}개 (${pct}%)`;
              }
            }
          }
        }
      },
      plugins: [{
        id: 'barLabel',
        afterDatasetsDraw(chart) {
          const { ctx, scales:{ x, y } } = chart;
          ctx.save();
          ctx.font = 'bold 12px Apple SD Gothic Neo, sans-serif';
          ctx.fillStyle = '#1a2456';
          ctx.textAlign = 'center';
          [...PRODUCTS, '전체'].forEach((p, i) => {
            const v = i < PRODUCTS.length ? totalProd[p] : totalPaidAll;
            if (!v) return;
            const pct = totalPaidAll ? ((v/totalPaidAll)*100).toFixed(1) : 0;
            const label = i < PRODUCTS.length ? `${v}개 (${pct}%)` : `${v}개`;
            ctx.fillText(label, x.getPixelForValue(i), y.getPixelForValue(v) - 7);
          });
          // 전체 합계 우상단 표시
          ctx.font = 'bold 13px Apple SD Gothic Neo, sans-serif';
          ctx.fillStyle = '#1a2456';
          ctx.textAlign = 'right';
          ctx.fillText(`전체 ${totalPaidAll}개`, chart.chartArea.right, chart.chartArea.top - 14);
          ctx.restore();
        }
      }]
    });

    // 2. 월별 매출
    new Chart(document.getElementById('chartRevenue'), {
      type: 'bar',
      data: {
        labels: MONTHS,
        datasets: [{
          label: '매출(원)',
          data: monthRev,
          backgroundColor: monthRev.map((v,i) => i===0 ? NAVY : NAVY_LIGHT),
          borderRadius: 6
        }]
      },
      options: { ...base, plugins: { ...base.plugins,
        tooltip: { callbacks: { label: ctx => ` ${fmt(ctx.raw)}원` } }
      }},
      plugins: [{
        id: 'revLabel',
        afterDatasetsDraw(chart) {
          const { ctx, scales:{ x, y } } = chart;
          ctx.save();
          ctx.font = 'bold 11px Apple SD Gothic Neo, sans-serif';
          ctx.fillStyle = '#1a2456';
          ctx.textAlign = 'center';
          monthRev.forEach((total, i) => {
            if (!total) return;
            ctx.fillText(fmt(total)+'원', x.getPixelForValue(i), y.getPixelForValue(total) - 7);
          });
          ctx.restore();
        }
      }]
    });

    // 3. 월별 무료체험 누적바
    new Chart(document.getElementById('chartMonthlyFree'), {
      type: 'bar',
      data: {
        labels: MONTHS,
        datasets: [
          { label: '2주 무료체험', data: month2w, backgroundColor: NAVY, borderRadius: 4, stack: 'free' },
          { label: '4주 무료체험', data: month4w, backgroundColor: YELLOW, borderRadius: 4, stack: 'free' }
        ]
      },
      options: { ...base,
        scales: {
          x: { ...base.scales.x, stacked: true },
          y: { ...base.scales.y, stacked: true }
        },
        plugins: { ...base.plugins, tooltip: { mode:'index', intersect:false } }
      },
      plugins: [{
        id: 'totalLabel',
        afterDatasetsDraw(chart) {
          const { ctx, scales:{ x, y } } = chart;
          ctx.save();
          ctx.font = 'bold 12px Apple SD Gothic Neo, sans-serif';
          ctx.fillStyle = '#1a2456'; ctx.textAlign = 'center';
          monthFreeTotal.forEach((total, i) => {
            if (!total) return;
            ctx.fillText(total, x.getPixelForValue(i), y.getPixelForValue(total) - 7);
          });
          ctx.restore();
        }
      }]
    });

    // 4. 일자별 꺾은선
    new Chart(document.getElementById('chartDailyFree'), {
      type: 'line',
      data: {
        labels: dailyLabels,
        datasets: [
          { label: '2주 무료체험', data: daily2w, borderColor: NAVY, backgroundColor: 'rgba(26,36,86,0.06)', pointBackgroundColor: NAVY, pointRadius: 5, tension: 0.3, fill: false },
          { label: '4주 무료체험', data: daily4w, borderColor: '#f5c200', backgroundColor: 'rgba(245,194,0,0.06)', pointBackgroundColor: '#f5c200', pointRadius: 5, tension: 0.3, fill: false }
        ]
      },
      options: { ...base, plugins: { ...base.plugins, tooltip: { mode:'index', intersect:false } } }
    });

    // 5. 일자별 표
    const tbody = document.getElementById('tableBody');
    let tot2w=0, tot4w=0, totP={}, totRev=0;
    PRODUCTS.forEach(p => totP[p]=0);

    juneDates.forEach(ds => {
      const p   = paidCount[ds]   || {};
      const rev = paidRevenue[ds] || 0;
      const w2  = count2w[ds]     || 0;
      const w4  = count4w[ds]     || 0;
      const freeTotal = w2 + w4;
      const paidTotal = PRODUCTS.reduce((s,pr)=>s+(p[pr]||0),0);
      tot2w += w2; tot4w += w4; totRev += rev;
      PRODUCTS.forEach(pr => totP[pr]+=(p[pr]||0));

      const dow = new Date(ds).getDay();
      const dc  = dow===6 ? 'date sat' : dow===0 ? 'date sun' : 'date';
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="${dc}">${ds.slice(5)}</td>
        ${cell(w2)}${cell(w4)}
        <td class="free-total">${freeTotal||'-'}</td>
        ${PRODUCTS.map(pr=>cell(p[pr]||0)).join('')}
        <td class="paid-total">${paidTotal||'-'}</td>
        <td>${rev ? fmt(rev)+'원' : '<span class="zero">-</span>'}</td>`;
      tbody.appendChild(tr);
    });

    const totPaidAll = PRODUCTS.reduce((s,p)=>s+totP[p],0);
    const tr = document.createElement('tr');
    tr.className = 'total-row';
    tr.innerHTML = `
      <td class="date">합계</td>
      <td>${tot2w}</td><td>${tot4w}</td><td><b>${tot2w+tot4w}</b></td>
      ${PRODUCTS.map(p=>`<td>${totP[p]}</td>`).join('')}
      <td><b>${totPaidAll}</b></td>
      <td>${fmt(totRev)}원</td>`;
    tbody.appendChild(tr);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'block';

  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<p style="color:#c00;font-size:14px">데이터 로드 실패: ${e.message}</p>
       <p style="font-size:12px;color:#999;margin-top:8px">구글 시트 게시 설정을 확인해주세요.</p>`;
    console.error(e);
  }
}
main();
</script>
</body>
</html>
